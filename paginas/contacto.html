<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <main>
    <section class="flex min-h-screen">
      <div class="w-1/2 bg-blue-900 text-white p-20 flex flex-col justify-center">
        <h2 class="text-5xl font-bold">Hablemos.</h2>
        <p class="text-xl mt-6 opacity-80">¿Eres un centro médico interesado en nuestra tecnología Raspberry Pi? Contacta con nuestro equipo técnico.</p>
        <div class="mt-12 flex flex-col gap-4">
          <p>📍 Calle Innovación 42, Barcelona</p>
          <p>📞 +34 900 123 456</p>
          <p>📧 soporte@securedate.com</p>
        </div>
      </div>
      <div class="w-1/2 p-20 flex flex-col justify-center bg-white">
        <h2 class="text-3xl font-bold text-blue-900 mb-8">Enviar mensaje</h2>
        <div class="flex flex-col gap-6">
          <input type="text" placeholder="Nombre completo" class="border-b-2 p-4 outline-none focus:border-emerald-500">
          <input type="text" placeholder="Correo electrónico" class="border-b-2 p-4 outline-none focus:border-emerald-500">
          <input type="text" placeholder="Mensaje" class="border-b-2 p-4 h-32 outline-none focus:border-emerald-500">
          <button class="bg-blue-900 text-white py-4 rounded-lg font-bold hover:bg-emerald-500 transition">Enviar Solicitud</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
