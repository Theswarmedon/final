<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <main class="flex items-center justify-center min-h-screen bg-slate-100">
    <div class="bg-white p-12 rounded-3xl shadow-xl w-[500px]">
      <h1 class="text-3xl font-bold text-blue-900">Acceso Seguro</h1>
      <p class="text-gray-500 mt-2">Gestiona tus citas médicas con encriptación.</p>
      
      <div class="mt-10 flex flex-col gap-5">
        <div>
          <p class="mb-2 font-semibold">Identificador de Paciente</p>
          <input type="text" placeholder="DNI o NIE" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 ring-emerald-500">
        </div>
        <div>
          <p class="mb-2 font-semibold">Contraseña</p>
          <input type="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 ring-emerald-500">
        </div>
        <button class="bg-emerald-500 text-white py-4 rounded-xl font-bold mt-4 hover:bg-emerald-600 transition">Iniciar Sesión</button>
      </div>
      
      <div class="mt-8 text-center">
        <p class="text-gray-400">¿No tienes cuenta? <a href="#" class="text-blue-900 font-bold">Regístrate aquí</a></p>
      </div>
    </div>
  </main>
</body>
</html>
